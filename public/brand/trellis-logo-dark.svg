<svg width="400" height="100" viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="400" height="100" rx="12" fill="#1B4332"/>
  <!-- Trellis icon — white structure -->
  <g transform="translate(15, 5)">
    <line x1="10" y1="80" x2="10" y2="16" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="34" y1="80" x2="34" y2="16" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="58" y1="80" x2="58" y2="16" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
    <line x1="4" y1="66" x2="64" y2="66" stroke="#fff" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
    <line x1="4" y1="44" x2="64" y2="44" stroke="#fff" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
    <line x1="4" y1="22" x2="64" y2="22" stroke="#fff" stroke-width="1.2" stroke-linecap="round" opacity="0.7"/>
    <!-- Bottom — green -->
    <circle cx="10" cy="66" r="4" fill="#48B87A"/>
    <circle cx="34" cy="66" r="3.5" fill="#48B87A" opacity="0.9"/>
    <circle cx="58" cy="66" r="3" fill="#48B87A" opacity="0.8"/>
    <!-- Middle — chartreuse -->
    <circle cx="10" cy="44" r="4.5" fill="#8CC63F"/>
    <circle cx="34" cy="44" r="4" fill="#8CC63F" opacity="0.9"/>
    <circle cx="58" cy="44" r="3.5" fill="#8CC63F" opacity="0.7"/>
    <!-- Top crossbar — gold -->
    <circle cx="10" cy="22" r="5" fill="#D4A828"/>
    <circle cx="34" cy="22" r="4.5" fill="#D4A828" opacity="0.85"/>
    <!-- Floating free -->
    <circle cx="58" cy="8" r="3" fill="#D4A828" opacity="0.6"/>
    <circle cx="10" cy="0" r="4" fill="#D4A828" opacity="0.7"/>
    <circle cx="34" cy="-4" r="3.5" fill="#D4A828" opacity="0.5"/>
  </g>
  <!-- Wordmark -->
  <text x="92" y="52" font-family="'DM Serif Display', Georgia, serif" font-size="42" font-weight="400" letter-spacing="0.02em" fill="#fff">Trellis</text>
  <!-- Tagline -->
  <text x="94" y="74" font-family="'DM Sans', system-ui, sans-serif" font-size="12" font-weight="400" letter-spacing="0.05em" fill="#D4A828">NAVIGATE CANADA'S AGTECH ECOSYSTEM</text>
</svg>
