<svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
  <rect width="72" height="72" rx="16" fill="#1B4332"/>
  <!-- Trellis structure — white, verticals stop short -->
  <line x1="20" y1="58" x2="20" y2="18" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="58" x2="36" y2="18" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="52" y1="58" x2="52" y2="18" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="48" x2="56" y2="48" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="34" x2="56" y2="34" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="16" y1="22" x2="56" y2="22" stroke="#fff" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Bottom — green -->
  <circle cx="20" cy="48" r="3.5" fill="#48B87A"/>
  <circle cx="36" cy="48" r="3" fill="#48B87A" opacity="0.9"/>
  <circle cx="52" cy="48" r="2.5" fill="#48B87A" opacity="0.8"/>
  <!-- Middle — chartreuse -->
  <circle cx="20" cy="34" r="4" fill="#8CC63F"/>
  <circle cx="36" cy="34" r="3.5" fill="#8CC63F" opacity="0.85"/>
  <circle cx="52" cy="34" r="3" fill="#8CC63F" opacity="0.7"/>
  <!-- Top — gold -->
  <circle cx="20" cy="22" r="4" fill="#D4A828"/>
  <circle cx="36" cy="20" r="3" fill="#D4A828" opacity="0.7"/>
  <!-- Floating past -->
  <circle cx="20" cy="12" r="3" fill="#D4A828" opacity="0.6"/>
</svg>
